<!DOCTYPE html>
<html>
<head>
    <title>Max and Min Number</title>
</head>
<body>

<h2>Find Maximum and Minimum</h2>

<input type="number" id="num1" placeholder="Enter first number">
<input type="number" id="num2" placeholder="Enter second number">
<input type="number" id="num3" placeholder="Enter third number">

<br><br>

<button onclick="findMaxMin()">Find</button>

<p id="result"></p>

<script>
function findMaxMin() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let c = Number(document.getElementById("num3").value);

    let max = Math.max(a, b, c);
    let min = Math.min(a, b, c);

    document.getElementById("result").innerHTML =
        "Maximum: " + max + "<br>Minimum: " + min;
}
</script>

</body>
</html>
